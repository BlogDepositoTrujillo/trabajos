<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compartir Ubicación</title>
</head>
<body>
    <h2>Transmitiendo ubicación en tiempo real...</h2>
    <p id="estado">Buscando señal de GPS...</p>

    <script>
        // Función para activar el rastreo continuo del GPS
        function iniciarRastreo() {
            if (navigator.geolocation) {
                // watchPosition sigue el movimiento automáticamente
                navigator.geolocation.watchPosition(exito, error, {
                    enableHighAccuracy: true, // Usa el GPS de alta precisión
                    timeout: 5000,
                    maximumAge: 0
                });
            } else {
                document.getElementById("estado").innerText = "Tu navegador no soporta GPS.";
            }
        }

        function exito(posicion) {
            const latitud = posicion.coords.latitude;
            const longitud = posicion.coords.longitude;
            
            document.getElementById("estado").innerText = `Lat: ${latitud}, Lon: ${longitud}`;
            
            // AQUÍ SE AGREGA EL CÓDIGO PARA ENVIAR LAS COORDENADAS A TU BASE DE DATOS
            console.log("Enviar a la base de datos:", latitud, longitud);
        }

        function error(err) {
            document.getElementById("estado").innerText = "Error al obtener GPS: " + err.message;
        }

        // Iniciar en cuanto se abra la página
        window.onload = iniciarRastreo;
    </script>
</body>
</html>
